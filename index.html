    <script>
      window.addEventListener('error', function(event) {
        document.documentElement.innerHTML = '<div style="color:red;font-size:20px;padding:20px;background:white;z-index:9999;position:absolute;top:0;left:0;width:100%;height:100%;">' + event.message + '<br>' + event.filename + ':' + event.lineno + '</div>';
      });
      window.addEventListener('unhandledrejection', function(event) {
        document.documentElement.innerHTML = '<div style="color:red;font-size:20px;padding:20px;background:white;z-index:9999;position:absolute;top:0;left:0;width:100%;height:100%;">Unhandled Rejection: ' + event.reason + '</div>';
      });
